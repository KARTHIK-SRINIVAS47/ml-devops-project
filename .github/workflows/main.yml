name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ml-api:${{ github.sha }} ./app

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ml-api:${{ github.sha }}

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/ml-api:${{ github.sha }}|" k8s/deployment.yaml

    - name: Commit Updated Manifest
      run: |
        git config --global user.email "ci@github.com"
        git config --global user.name "CI Bot"
        git add .
        git commit -m "Update image version" || echo "No changes"
        git push
